version: '3.9'

services:
  # ─── Message Broker ──────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: glowos-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ─── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glowos-frontend
    ports:
      - "3000:80"
    depends_on:
      - routine-service
      - product-drop-service
      - notification-service

  # ─── RoutineService ──────────────────────────────────────────────
  routine-service:
    build:
      context: ./services
      dockerfile: RoutineService/Dockerfile
    container_name: glowos-routine
    ports:
      - "5001:8080"
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - routine_data:/app/data

  # ─── ProductDropService ──────────────────────────────────────────
  product-drop-service:
    build:
      context: ./services
      dockerfile: ProductDropService/Dockerfile
    container_name: glowos-drops
    ports:
      - "5002:8080"
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - drops_data:/app/data

  # ─── NotificationService ─────────────────────────────────────────
  notification-service:
    build:
      context: ./services
      dockerfile: NotificationService/Dockerfile
    container_name: glowos-notifications
    ports:
      - "5003:8080"
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - notif_data:/app/data

  # ─── ReviewService (Worker) ───────────────────────────────────────
  review-service:
    build:
      context: ./services
      dockerfile: ReviewService/Dockerfile
    container_name: glowos-reviews
    environment:
      RabbitMQ__Host: rabbitmq
      RabbitMQ__User: guest
      RabbitMQ__Pass: guest
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - review_data:/app/data

volumes:
  rabbitmq_data:
  routine_data:
  drops_data:
  notif_data:
  review_data:
